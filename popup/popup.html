<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="header">

  <h2> Lockem</h2>

  <div class="header-actions">

    <button id="theme-btn">
      Theme
    </button>

    <button id="turn-off-on">
      Turn On/Off Lockem
    </button>

  </div>

</div>

<div id="off-screen">
  <h2>Lockem is Off</h2>
</div>

<div id="focus-active-screen" style="display:none">

  <h2>Focus Mode Active</h2>

  <p>
    Shorts are locked.
  </p>

  <div id="countdown">
    Loading...
  </div>

</div>

<div id="on-screen">

  <hr class="divider">

  <h3>Distraction Controls</h3>

  <label>
    <input type="checkbox" id="hideShorts">
    Hide Shorts
  </label>

  <label>
    <input type="checkbox" id="hideComments">
    Hide Comments
  </label>

  <label>
    <input type="checkbox" id="hideFeed">
    Hide Home Feed
  </label>

  <label>
    <input type="checkbox" id="hideSidebar">
    Hide Recommendations
  </label>

  <hr class="divider">

  <div class="focus-section">

  <h3>Focus Mode</h3>

  <p>
    Temporarily block Shorts for a fixed duration.
  </p>

  <button id="focusBtn">
    Start Focus Session
  </button>

  <div id="focusScreen" hidden>

    <div class="duration-row">

      <input
        id="focusMinutes"
        type="number"
        min="1"
        value="30">

      <span>minutes</span>

    </div>

    <div class="focus-actions">

      <button id="startFocus">
        Start Focus
      </button>

      <button id="cancelFocus">
        Cancel
      </button>

    </div>

  </div>

</div>

</div>

<script src="popup.js"></script>

</body>
</html>
